databases:
  - name: legal-department-db
    plan: free
    databaseName: legal_department
    user: legal_department

services:
  - type: web
    name: legal-department-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm run start
    preDeployCommand: npm run release
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: legal-department-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        sync: false
      - key: PORT
        value: 4000

  - type: web
    name: legal-department-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
